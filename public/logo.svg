<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- 服务器主体：三层层叠的服务器 -->
  <rect x="3" y="4" width="22" height="6.5" rx="1.8" fill="#9FE870"/>
  <rect x="3" y="12.75" width="22" height="6.5" rx="1.8" fill="#9FE870"/>
  <rect x="3" y="21.5" width="22" height="6.5" rx="1.8" fill="#9FE870"/>
  
  <!-- 服务器面板细节：每层的小圆点 -->
  <circle cx="7" cy="7.25" r="1.2" fill="#163300"/>
  <circle cx="7" cy="16" r="1.2" fill="#163300"/>
  <circle cx="7" cy="24.75" r="1.2" fill="#163300"/>
  
  <!-- 服务器面板短线 -->
  <rect x="10.5" y="6.5" width="6" height="1.5" rx="0.75" fill="#163300" opacity="0.35"/>
  <rect x="10.5" y="15.25" width="6" height="1.5" rx="0.75" fill="#163300" opacity="0.35"/>
  <rect x="10.5" y="24" width="6" height="1.5" rx="0.75" fill="#163300" opacity="0.35"/>
  
  <!-- 验证勾选标记 -->
  <circle cx="26" cy="25" r="5.5" fill="#2e7314"/>
  <path d="M23.2 25L25.2 27.2L29 22.8" stroke="#9FE870" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
</svg>